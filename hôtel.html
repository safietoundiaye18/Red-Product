    <div class="transparant" id="modalProfil">
        <div class="modal">
            <div>
                <p class="haut">
                    <i id="fermerProfil" class="fa-solid fa-arrow-left" style="color: rgb(0, 0, 0);"></i>
                    Mon Profil
                </p>
            </div>

            <div id="border" style="border-top: 1.2px dotted rgb(146, 146, 146); padding-top: 20px;">

                <!-- Photo de profil -->
                <div style="text-align: center; margin-bottom: 20px;">
                    <img id="profilAvatar" src="images/d0ad5715ff957c6bfb22eb955f71f63b6a0704d4.png"
                        style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
                    <br>
                    <label style="cursor: pointer; color: gray; font-size: 0.85rem; margin-top: 8px; display: block;">
                        <input type="file" id="avatarFile" hidden accept="image/*">
                        Changer la photo
                    </label>
                </div>

                <!-- Message -->
                <p id="messageProfil" style="font-size: 0.85rem; display: none; text-align: center;"></p>

                <!-- Champs -->
                <div class="div1">
                    <label>Nom</label>
                    <input type="text" id="profilNom"
                        style="width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                </div>

                <div class="div1">
                    <label>Email</label>
                    <input type="email" id="profilEmail"
                        style="width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                </div>

                <button id="btnSauvegarderProfil" class="btnform"
                    style="width: 100%; background-color: rgb(70, 130, 180);">
                    Sauvegarder
                </button>

                <!-- Changer mot de passe -->
                <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
                    <p style="font-weight: bold; margin-bottom: 10px;">Changer le mot de passe</p>

                    <div class="div1">
                        <label>Ancien mot de passe</label>
                        <input type="password" id="ancienMotDePasse"
                            style="width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>

                    <div class="div1">
                        <label>Nouveau mot de passe</label>
                        <input type="password" id="nouveauMotDePasse"
                            style="width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>

                    <button id="btnChangerMotDePasse" class="btnform"
                        style="width: 100%; background-color: rgb(77, 77, 77);">
                        Changer le mot de passe
                    </button>
                </div>
            </div>
        </div>
    </div>

        <!-- Modal ajouter-->

        <div class="transparant" id="modalAjouter">
            <div class="modal" id="modalAjouterContent">
                <div>
                    <p class="haut"><i id="fermermodal" class="fa-solid fa-arrow-left"
                            style="color: rgb(0, 0, 0);"></i>Créer un nouveau
                        hôtel</p>
                </div>

                <form id="border" action="">
                    <div class="display">
                        <div>
                            <div class="div1">
                                <div class="div1"><label for="name">Nom de l'hôtel</label></div>
                                <input type="text" id="name" placeholder="CAP Mariane">
                                <p class="erreur-input" id="erreur-nom"></p>
                            </div>

                            <div class="div1">
                                <div class="div1"><label for="Email">E-mail</label></div>
                                <input type="text" id="Email" placeholder="information@gmail.com">
                                <p class="erreur-input" id="erreur-email"></p>
                            </div>

                            <div class="div1">
                                <div class="div1"><label for="prix">Prix par nuit</label></div>
                                <input type="number" id="prix" placeholder="25.000 XOF">
                                <p class="erreur-input" id="erreur-prix"></p>
                            </div>
                        </div>

                        <div>
                            <div class="div1">
                                <div class="div1"><label for="adresse">Adresse</label></div>
                                <input class="div11" type="text" id="adresse"
                                    placeholder="Les îles du saloum, Mar Lodj">
                                <p class="erreur-input" id="erreur-adresse"></p>
                            </div>

                            <div class="div1">
                                <div class="div1" class="div11"><label for="muméro">Numéro de téléphone</label></div>
                                <input type="text" id="muméro" placeholder="+221 77 777 77 77">
                                <p class="erreur-input" id="erreur-telephone"></p>
                            </div>

                            <div class="div1">
                                <div class="div1"><label class="lab" for="devise">Devise</label></div>
                                <select class="select">
                                    <option>F XOF</option>
                                    <option>Euro</option>
                                    <option>Dollar</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <p>Ajouter une photo</p>
                    <label class="label">
                        <input type="file" id="imageHotel" hidden>
                        <div class="imgholder">
                            <i class="fa-solid fa-image fa-lg" style="color: rgb(167, 165, 165);"></i>
                            <p>Ajouter une photo</p>
                        </div>
                    </label>

                    <div class="mit"> <button type="button" class="btnform">Enregistrer</button> </div>
                </form>

    <!-- Modal Détail/Modifier Hôtel -->
    <div class="transparant" id="modalDetail">
        <div class="modal">
            <div>
                <p class="haut">
                    <i id="fermerDetail" class="fa-solid fa-arrow-left" style="color: rgb(0, 0, 0);"></i>
                    Détail de l'hôtel
                </p>
            </div>

            <div id="border">
                <div style="text-align: center; margin-bottom: 15px;">
                    <img id="detailImage" src="" alt=""
                        style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px;">
                </div>

                <div class="display">
                    <div>
                        <div class="div1">
                            <label>Nom de l'hôtel</label>
                            <input type="text" id="detailNom" placeholder="Nom">
                        </div>
                        <div class="div1">
                            <label>E-mail</label>
                            <input type="text" id="detailEmail" placeholder="E-mail">
                        </div>
                        <div class="div1">
                            <label>Prix par nuit</label>
                            <input type="number" id="detailPrix" placeholder="Prix">
                        </div>
                    </div>
                    <div>
                        <div class="div1">
                            <label>Adresse</label>
                            <input type="text" id="detailAdresse" placeholder="Adresse">
                        </div>
                        <div class="div1">
                            <label>Numéro de téléphone</label>
                            <input type="text" id="detailTelephone" placeholder="Téléphone">
                        </div>
                        <div class="div1">
                            <label>Devise</label>
                            <select id="detailDevise">
                                <option>F XOF</option>
                                <option>Euro</option>
                                <option>Dollar</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="div1">
                    <label>Changer la photo</label>
                    <label class="label">
                        <input type="file" id="detailImageFile" hidden>
                        <div class="imgholder">
                            <i class="fa-solid fa-image fa-lg" style="color: rgb(167, 165, 165);"></i>
                            <p>Changer la photo</p>
                        </div>
                    </label>
                </div>

                <input type="hidden" id="detailId">

                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="btnModifier" class="btnform" style="background-color: rgb(70, 130, 180); flex: 1;">
                        Modifier
                    </button>
                    <button id="btnSupprimer" class="btnform" style="background-color: rgb(220, 53, 69); flex: 1;">
                        Supprimer
                    </button>
                </div>
            </div>
