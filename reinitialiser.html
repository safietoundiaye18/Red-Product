<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Product</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=dashboard" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="formulaire">
        <div class="bgoppacité2">
            <form id="formReset" class="round">
                <div class="icon3">
                    <div class="logo"><img class="logo" src="images/Link → SVG.png" alt=""></div>
                    <p class="centrer">RED PRODUCT</p>
                </div>
                <div class="bg1">
                    <p class="p1">Réinitialiser le mot de passe</p>
                    <p class="p5">Entrez votre nouveau mot de passe ci-dessous.</p>

                    <!-- Message -->
                    <p id="messageReset" style="font-size: 0.85rem; display: none; margin-top: 8px;"></p>

                    <div style="position: relative;">
                        <input class="inputform1" type="password" id="motDePasse" placeholder="Nouveau mot de passe" required>
                        <i class="fa-regular fa-eye" id="togglePassword1" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: gray;"></i>
                    </div>

                    <div style="position: relative;">
                        <input class="inputform1" type="password" id="confirmerMotDePasse" placeholder="Confirmer le mot de passe" required>
                        <i class="fa-regular fa-eye" id="togglePassword2" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: gray;"></i>
                    </div>

                    <button type="submit" class="button" id="btnReset">
                        <b>Réinitialiser</b>
                    </button>
                </div>
                <p class="p4">Revenir à la <a class="textdecoration" href="index.html"><strong>connexion</strong></a></p>
            </form>
        </div>
    </div>

    <script src="reinitialiser.js"></script>
</body>

</html>
